name: ironbook_gm
description: Gym Management App for solo gym owners
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0             # Outfit font only
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10
  lucide_icons: ^0.257.0

  # Local storage — device is the authority
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Firebase — cloud is passive backup only
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.0.2
  firebase_messaging: ^15.0.3

  # Subscription billing
  purchases_flutter: ^6.22.0       # RevenueCat

  # Security
  flutter_secure_storage: ^9.0.0   # Entitlement, PIN hash, HMAC key, Hive key
  local_auth: ^2.1.7               # Biometric fingerprint
  crypto: ^3.0.3                   # HMAC SHA-256 signing

  # Background jobs
  workmanager: ^0.5.2              # Midnight engine (Android)

  # Local notifications
  flutter_local_notifications: ^16.3.0

  # Invoice generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Sharing
  share_plus: ^7.2.1

  # Charts
  fl_chart: ^0.66.2

  # Utilities
  uuid: ^4.3.3
  intl: ^0.18.1
  equatable: ^2.0.5
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

dependency_overrides:
  firebase_auth_web: ^5.1.4
  firebase_core_web: ^2.11.1
